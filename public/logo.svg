<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for 3D effect -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC143C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B22222;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B0000;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="ribbonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#DC143C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B22222;stop-opacity:1" />
    </linearGradient>
    
    <!-- Drop shadow filter -->
    <filter id="dropshadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    
    <!-- Inner shadow filter -->
    <filter id="innershadow" x="-50%" y="-50%" width="200%" height="200%">
      <feFlood flood-color="#000000" flood-opacity="0.3"/>
      <feComposite in="SourceGraphic"/>
    </filter>
  </defs>
  
  <!-- Main shield background -->
  <path d="M60 10 L100 30 L100 80 L60 100 L20 80 L20 30 Z" 
        fill="url(#redGradient)" 
        stroke="url(#goldGradient)" 
        stroke-width="3"/>
  
  <!-- Ribbon -->
  <path d="M25 45 Q60 35 95 45 Q60 55 25 45 Z" 
        fill="url(#ribbonGradient)" 
        filter="url(#dropshadow)"/>
  
  <!-- Bottom black section -->
  <path d="M25 45 L95 45 L100 80 L60 100 L20 80 Z" 
        fill="#1a1a1a" 
        stroke="url(#goldGradient)" 
        stroke-width="2"/>
  
  <!-- Movie ticket icon (top left) -->
  <g transform="translate(30, 25)">
    <rect x="0" y="0" width="20" height="12" rx="2" fill="white" opacity="0.9"/>
    <circle cx="2" cy="3" r="1" fill="none" stroke="#333" stroke-width="0.5"/>
    <circle cx="2" cy="9" r="1" fill="none" stroke="#333" stroke-width="0.5"/>
    <rect x="4" y="2" width="14" height="8" fill="none" stroke="#333" stroke-width="0.5"/>
    <text x="6" y="7" font-family="Arial, sans-serif" font-size="4" font-weight="bold" fill="#333">MOVIE</text>
  </g>
  
  <!-- Film reel icon (top right) -->
  <g transform="translate(70, 25)">
    <circle cx="10" cy="6" r="8" fill="white" opacity="0.9"/>
    <circle cx="10" cy="6" r="3" fill="#333"/>
    <rect x="6" y="0" width="8" height="12" fill="none" stroke="#333" stroke-width="0.5"/>
    <rect x="8" y="2" width="4" height="8" fill="none" stroke="#333" stroke-width="0.5"/>
  </g>
  
  <!-- MOVIEHUB text on ribbon -->
  <text x="60" y="50" font-family="Arial, sans-serif" font-size="8" font-weight="bold" 
        text-anchor="middle" fill="white" filter="url(#dropshadow)">MOVIEHUB</text>
  
  <!-- Stars on ribbon sides -->
  <g transform="translate(15, 40)">
    <polygon points="0,-3 1,-1 3,-1 1.5,0.5 2,2.5 0,1.5 -2,2.5 -1.5,0.5 -3,-1 -1,-1" 
             fill="url(#goldGradient)"/>
  </g>
  <g transform="translate(105, 40)">
    <polygon points="0,-3 1,-1 3,-1 1.5,0.5 2,2.5 0,1.5 -2,2.5 -1.5,0.5 -3,-1 -1,-1" 
             fill="url(#goldGradient)"/>
  </g>
  
  <!-- Five stars on black section -->
  <g transform="translate(40, 70)">
    <polygon points="0,-2 0.5,-0.5 2,-0.5 1,0.5 1.5,2 0,1.5 -1.5,2 -1,0.5 -2,-0.5 -0.5,-0.5" 
             fill="url(#goldGradient)"/>
  </g>
  <g transform="translate(50, 70)">
    <polygon points="0,-2 0.5,-0.5 2,-0.5 1,0.5 1.5,2 0,1.5 -1.5,2 -1,0.5 -2,-0.5 -0.5,-0.5" 
             fill="url(#goldGradient)"/>
  </g>
  <g transform="translate(60, 70)">
    <polygon points="0,-2 0.5,-0.5 2,-0.5 1,0.5 1.5,2 0,1.5 -1.5,2 -1,0.5 -2,-0.5 -0.5,-0.5" 
             fill="url(#goldGradient)"/>
  </g>
  <g transform="translate(70, 70)">
    <polygon points="0,-2 0.5,-0.5 2,-0.5 1,0.5 1.5,2 0,1.5 -1.5,2 -1,0.5 -2,-0.5 -0.5,-0.5" 
             fill="url(#goldGradient)"/>
  </g>
  <g transform="translate(80, 70)">
    <polygon points="0,-2 0.5,-0.5 2,-0.5 1,0.5 1.5,2 0,1.5 -1.5,2 -1,0.5 -2,-0.5 -0.5,-0.5" 
             fill="url(#goldGradient)"/>
  </g>
  
  <!-- Large star at bottom -->
  <g transform="translate(60, 90)">
    <ellipse cx="0" cy="2" rx="8" ry="3" fill="#8B0000"/>
    <polygon points="0,-4 1.5,-1.5 4,-1.5 2,0.5 3,3.5 0,2 -3,3.5 -2,0.5 -4,-1.5 -1.5,-1.5" 
             fill="url(#goldGradient)" filter="url(#dropshadow)"/>
  </g>
</svg>